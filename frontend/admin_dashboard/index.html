<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Master PC — Admin Dashboard</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="./style.css">
</head>

<body>

   <!-- ── Toast Container ────────────────────────────────────────── -->
   <div id="toastContainer" class="toast-container"></div>

   <!-- ── Header ─────────────────────────────────────────────────── -->
   <header>
      <div class="header-left">
         <h1>⚡ Admin Dashboard</h1>
         <span class="badge" id="teamCountBadge">0 Teams</span>
         <span class="status-dot" id="serverDot"></span>
         <span class="server-label" id="serverLabel">Connecting...</span>
      </div>
      <div class="controls">
         <button class="btn btn-outline" id="refreshBtn" title="Force refresh">↻ Refresh</button>
         <button class="btn btn-blue" id="createTeamBtn">➕ Create Team</button>
         <button class="btn btn-blue" id="manageBtn">📋 Manage Assignments</button>
         <button class="btn btn-green" id="startBtn" onclick="startAll()">🚀 Start All</button>
         <button class="btn btn-red" id="resetBtn" onclick="resetAll()">⟲ Reset</button>
      </div>
   </header>

   <!-- ── Empty State ────────────────────────────────────────────── -->
   <div class="empty-state" id="emptyState">
      <p>📭 No teams available</p>
      <p class="sub">Create teams via the API to get started</p>
   </div>

   <!-- ── Team Grid ──────────────────────────────────────────────── -->
   <div class="container" id="teamContainer"></div>

   <!-- ── Error Modal ────────────────────────────────────────────── -->
   <div class="modal-overlay" id="errorModal">
      <div class="modal">
         <h3 id="modalTitle">⚠️ Cannot Start</h3>
         <p id="modalMessage"></p>
         <button class="btn btn-outline" onclick="closeModal()">OK</button>
      </div>
   </div>

   <script src="./script.js"></script>

</body>

</html>
